name: 10x-stack-template

# The full local Supabase stack (API/Kong, Auth, Storage, Studio, Postgres) is
# run by the Supabase CLI via `supabase start`, NOT by this compose file --
# `make up` starts it first. Services below reach it on the host:
#   browser/frontend      -> http://localhost:54321
#   in-container worker   -> http://host.docker.internal:54321

services:
  temporal-db:
    image: postgres:15-alpine
    container_name: temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.21.3
    container_name: temporal
    restart: unless-stopped
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - TEMPORAL_CLI_ADDRESS=localhost:7233
    ports:
      - "127.0.0.1:7234:7233"
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  temporal-ui:
    image: temporalio/ui:2.21.2
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "127.0.0.1:8081:8080"

  temporal-worker:
    build: ./temporal
    container_name: temporal-worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    env_file:
      - path: .env.temporal.example
        required: true
      - path: .env.temporal
        required: false
    # Reach the host-bound Supabase API from inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - HTTP_PORT=${HTTP_PORT:-3001}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}
      # LLM provider — only the key for your chosen provider needs to be set.
      # See .env.example for all provider options and their required vars.
      - PIAGENT_PROVIDER=${PIAGENT_PROVIDER:-anthropic}
      - PIAGENT_MODEL_ID=${PIAGENT_MODEL_ID:-claude-sonnet-4-6}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AZURE_API_BASE=${AZURE_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-}
      - AZURE_OPENAI_BASE_URL=${AZURE_OPENAI_BASE_URL:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-}
      # GPT-5.x/o-series deployments need max_completion_tokens; gpt-4o uses max_tokens
      - AZURE_OPENAI_MAX_TOKENS_FIELD=${AZURE_OPENAI_MAX_TOKENS_FIELD:-}
      # Azure AAD service-principal auth (used when no AZURE_OPENAI_API_KEY is set)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      # Pre-fetched AAD token escape hatch for local smoke tests (optional)
      - AZURE_OPENAI_BEARER_TOKEN=${AZURE_OPENAI_BEARER_TOKEN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      # Exa Search (web_search / web_crawl) — gracefully stubs without this key
      - EXA_API_KEY=${EXA_API_KEY:-}
    ports:
      - "127.0.0.1:${HTTP_PORT:-3001}:${HTTP_PORT:-3001}"

  # Gmail MCP/HTTP-tool server for the email-order-import workflow.
  # The worker reaches it at http://gmail-mcp:8080 (the definition's gmail_mcp_url
  # variable). Defaults to STUB mode so the stack runs without Gmail credentials;
  # set GMAIL_MCP_STUB=false and provide GMAIL_*/SUPABASE_* to use a real inbox.
  gmail-mcp:
    build: ./services/gmail-mcp
    container_name: gmail-mcp
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8080
      - GMAIL_MCP_STUB=${GMAIL_MCP_STUB:-true}
      - GMAIL_MCP_PUBLIC_URL=${GMAIL_MCP_PUBLIC_URL:-http://gmail-mcp:8080}
      - ORDER_PDF_BUCKET=${ORDER_PDF_BUCKET:-order-pdfs}
      - SIGNED_URL_TTL=${SIGNED_URL_TTL:-600}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}
    ports:
      - "127.0.0.1:8088:8080"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      temporal:
        condition: service_started
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:54321}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-dev-anon-key}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:54321/functions/v1}
    ports:
      - "127.0.0.1:3000:8080"

volumes:
  temporal-db-data:
